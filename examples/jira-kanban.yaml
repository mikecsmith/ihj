# ihj config — Jira kanban board
#
# Generated by: ihj jira bootstrap PROJ
# Adjust values to match your workflow.

theme: "default"
editor: "nvim"
default_workspace: "my-board"

servers:
  my-jira:
    provider: "jira"
    url: "https://company.atlassian.net"

workspaces:
  my-board:
    server: "my-jira"
    name: "My Board"
    board_id: 42         # Only used as {id} variable in JQL templates
    board_type: "kanban"
    project_key: "PROJ"

    # Fields map Jira custom field IDs to semantic names.
    # Each entry becomes a {name} variable for use in JQL templates below,
    # and values are displayed in the TUI and manifests.
    # Bootstrap auto-detects these from your Jira instance.
    fields:
      epic_name: 10009
      epic_link: 10014

    # JQL templates — {project_key}, {id}, {name}, {slug} and any fields
    # entry are expanded at query time. See docs/jira.md for the full list.
    jql: 'project = "{project_key}"'

    # Filter names are arbitrary — add, rename, or remove to suit your workflow.
    # Each value is a JQL fragment AND-ed with the base jql above.
    # An empty string means no additional filtering.
    # "active" is used on launch by default. Switch filters with Alt+F (or f in vim mode).
    filters:
      active: "statusCategory != Done OR resolved >= -2w"
      me: "assignee = currentUser() AND statusCategory != Done"
      all: ""

    # Statuses define the workflow order and display colours in the TUI.
    # order: controls sort position.
    # color: black, red, green, yellow, blue, magenta, cyan, white, dim, default,
    #        or any ANSI number / hex value (e.g. "208", "#ff5733").
    statuses:
      - name: Backlog
        order: 10
        color: default
      - name: To Do
        order: 20
        color: cyan
      - name: In Progress
        order: 30
        color: blue
      - name: In Review
        order: 40
        color: magenta
      - name: Done
        order: 50
        color: green

    # Issue types with sort order and display colours (same colour options as statuses).
    # has_children: whether this type can have child issues.
    # template: optional Markdown template pre-populated when creating issues of this type.
    types:
      - id: 1
        name: Epic
        order: 20
        color: magenta
        has_children: true
      - id: 3
        name: Task
        order: 30
        color: default
        has_children: true
      - id: 7
        name: Bug
        order: 30
        color: red
        has_children: true
        template: |
          ## Steps to Reproduce

          1.

          ## Expected Behaviour

          ## Actual Behaviour
